<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechZone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');

:root{
  --bg:#0a0a0f; /* fondo original intacto */
  --surface:rgba(20,20,30,.72);
  --surface-2:rgba(28,28,42,.88);
  --border:rgba(255,255,255,.08);

  --accent:#7c3aed;
  --accent2:#06b6d4;
  --accent3:#ec4899;

  --text:#f8fafc;
  --muted:#94a3b8;
  --danger:#ff4d6d;

  --shadow:0 10px 35px rgba(0,0,0,.35);
  --blur:blur(16px);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

button.save-stock{
  background: linear-gradient(135deg, #7c3aed, #ec4899);
  color: #fff;

  border: none;
  border-radius: 12px;

  padding: 8px 14px;

  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 700;

  cursor: pointer;

  transition: all .25s ease;

  box-shadow: 0 6px 18px rgba(124,58,237,.35);
}

button.save-stock:hover{
  transform: translateY(-2px);

  box-shadow: 0 10px 24px rgba(236,72,153,.30);

  opacity: .95;
}

button.save-stock:active{
  transform: scale(.96);
}


body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  background-image:
    radial-gradient(circle at top left, rgba(124,58,237,.16), transparent 25%),
    radial-gradient(circle at bottom right, rgba(6,182,212,.12), transparent 25%);
}

/* NAVBAR */

nav{
  position:sticky;
  top:0;
  z-index:999;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:1rem 2.5rem;

  background:rgba(10,10,15,.65);
  backdrop-filter:var(--blur);
  border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
  font-size:1.55rem;
  font-weight:800;
  letter-spacing:-1px;

  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.logo span{
  -webkit-text-fill-color:var(--text);
}

.nav-tabs{
  display:flex;
  gap:.7rem;
}

.tab{
  position:relative;

  border:none;
  background:transparent;

  color:var(--muted);
  padding:.7rem 1rem;

  border-radius:14px;

  cursor:pointer;

  font-family:inherit;
  font-size:.88rem;
  font-weight:500;

  transition:.25s ease;
}

.tab::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:14px;

  background:linear-gradient(135deg,var(--accent),var(--accent2));
  opacity:0;

  transition:.25s ease;
  z-index:-1;
}

.tab:hover,
.tab.active{
  color:white;
}

.tab:hover::before,
.tab.active::before{
  opacity:.18;
}

.cart-btn{
  border:none;
  cursor:pointer;

  padding:.8rem 1.2rem;
  border-radius:16px;

  font-family:inherit;
  font-weight:700;
  font-size:.85rem;

  color:white;

  background:
    linear-gradient(135deg,var(--accent),var(--accent3));

  box-shadow:
    0 8px 24px rgba(124,58,237,.35);

  transition:.25s ease;
}

.cart-btn:hover{
  transform:translateY(-2px) scale(1.02);
}

/* PAGES */

.page{
  display:none;
  max-width:1300px;
  margin:auto;
  padding:2rem;
}

.page.active{
  display:block;
}

h2{
  font-size:2.3rem;
  font-weight:800;
  letter-spacing:-1px;
  margin-bottom:1.8rem;
}

h2 span{
  background:linear-gradient(135deg,var(--accent2),var(--accent3));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* FILTERS */

.filters{
  display:flex;
  flex-wrap:wrap;
  gap:.7rem;
  margin-bottom:2rem;
}

.filter-btn{
  border:1px solid rgba(255,255,255,.06);

  background:rgba(255,255,255,.03);
  backdrop-filter:blur(10px);

  color:var(--muted);

  padding:.6rem 1rem;
  border-radius:999px;

  cursor:pointer;

  font-family:inherit;
  font-size:.82rem;
  font-weight:500;

  transition:.25s ease;
}

.filter-btn:hover,
.filter-btn.active{
  color:white;
  border-color:transparent;

  background:
    linear-gradient(
      135deg,
      rgba(124,58,237,.35),
      rgba(6,182,212,.28)
    );
}

/* PRODUCT GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:1.3rem;
}

.card{
  position:relative;
  overflow:hidden;

  background:var(--surface);
  backdrop-filter:var(--blur);

  border:1px solid var(--border);
  border-radius:26px;

  padding:1.2rem;

  box-shadow:var(--shadow);

  transition:.3s ease;
}

.card::before{
  content:'';
  position:absolute;
  inset:-1px;

  background:
    linear-gradient(
      135deg,
      rgba(124,58,237,.45),
      rgba(6,182,212,.15),
      transparent 55%
    );

  opacity:0;
  transition:.3s ease;
  z-index:0;
}

.card:hover{
  transform:translateY(-8px);
  border-color:rgba(255,255,255,.12);
}

.card:hover::before{
  opacity:1;
}

.card > *{
  position:relative;
  z-index:1;
}

.card-emoji{
  font-size:3rem;
  margin-bottom:.8rem;
}

.rec-badge{
  display:inline-flex;
  align-items:center;
  gap:.3rem;

  padding:.3rem .7rem;
  margin-bottom:.7rem;

  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2)
    );

  color:white;

  font-size:.68rem;
  font-family:'DM Mono',monospace;
}

.card-name{
  font-size:1.05rem;
  font-weight:700;
  margin-bottom:.4rem;
}

.card-cat{
  color:var(--muted);
  font-size:.72rem;
  font-family:'DM Mono',monospace;
  margin-bottom:.8rem;
}

.card-price{
  font-size:1.5rem;
  font-weight:800;

  background:
    linear-gradient(135deg,var(--accent2),#fff);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  margin-bottom:.5rem;
}

.card-stock{
  font-size:.76rem;
  color:var(--muted);
  margin-bottom:1rem;
}

.card-stock.low{
  color:var(--danger);
}

.add-btn{
  width:100%;

  border:none;
  border-radius:16px;

  padding:.85rem;

  cursor:pointer;

  font-family:inherit;
  font-weight:700;
  font-size:.9rem;

  color:white;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent3)
    );

  transition:.25s ease;
}

.add-btn:hover{
  transform:scale(1.03);
  box-shadow:
    0 10px 28px rgba(236,72,153,.28);
}

/* CART */

.cart-item,
.cart-summary,
.order-card,
.stat-card{
  background:var(--surface);
  backdrop-filter:var(--blur);

  border:1px solid var(--border);
  border-radius:24px;

  box-shadow:var(--shadow);
}

.cart-item{
  display:flex;
  align-items:center;
  gap:1rem;

  padding:1rem;
  margin-bottom:1rem;
}

.cart-item-info{
  flex:1;
}

.cart-item-name{
  font-size:.96rem;
  font-weight:700;
}

.cart-item-price{
  color:var(--accent2);
  font-family:'DM Mono',monospace;
  font-size:.82rem;
}

.qty-btn{
  width:30px;
  height:30px;

  border:none;
  border-radius:10px;

  background:rgba(255,255,255,.05);

  color:white;
  cursor:pointer;

  transition:.2s ease;
}

.qty-btn:hover{
  background:rgba(124,58,237,.4);
}

.rm-btn{
  border:none;
  background:none;
  color:var(--danger);

  cursor:pointer;
  font-size:1rem;
}

.cart-summary{
  padding:1.3rem;
}

.cart-total{
  font-size:1.5rem;
  font-weight:800;

  background:
    linear-gradient(135deg,var(--accent2),var(--accent3));

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* FORM */

.form-group{
  margin-bottom:1.1rem;
}

label{
  display:block;
  margin-bottom:.45rem;

  color:var(--muted);

  font-size:.78rem;
  font-family:'DM Mono',monospace;
}

input,
select{
  width:100%;

  padding:.9rem 1rem;

  border-radius:16px;
  border:1px solid rgba(255,255,255,.06);

  background:var(--surface-2);

  color:white;

  font-family:inherit;
  font-size:.92rem;

  transition:.25s ease;
}

input:focus,
select:focus{
  outline:none;
  border-color:rgba(124,58,237,.6);

  box-shadow:
    0 0 0 4px rgba(124,58,237,.15);
}

.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
}

.btn-primary{
  border:none;

  padding:.95rem 1.5rem;
  border-radius:18px;

  cursor:pointer;

  font-family:inherit;
  font-size:1rem;
  font-weight:800;

  color:white;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent3)
    );

  transition:.25s ease;
}

.btn-primary:hover{
  transform:translateY(-2px);
}

.btn-secondary{
  border:1px solid rgba(255,255,255,.08);

  background:rgba(255,255,255,.03);

  color:var(--muted);

  padding:.8rem 1.2rem;
  border-radius:16px;

  cursor:pointer;

  font-family:inherit;
  font-size:.9rem;

  transition:.25s ease;
}

.btn-secondary:hover{
  color:white;
  border-color:rgba(255,255,255,.18);
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;

  padding:.9rem .7rem;

  color:var(--muted);

  font-size:.76rem;
  font-family:'DM Mono',monospace;
  font-weight:500;

  border-bottom:1px solid rgba(255,255,255,.06);
}

td{
  padding:1rem .7rem;
  border-bottom:1px solid rgba(255,255,255,.04);
}

tr:hover td{
  background:rgba(255,255,255,.02);
}

/* STATUS */

.status-badge{
  padding:.35rem .75rem;
  border-radius:999px;

  font-size:.72rem;
  font-weight:700;

  font-family:'DM Mono',monospace;
}

.status-pendiente{
  background:rgba(255,170,0,.12);
  color:#ffaa00;
}

.status-enviado{
  background:rgba(6,182,212,.12);
  color:var(--accent2);
}

.status-entregado{
  background:rgba(16,185,129,.12);
  color:#10b981;
}

/* STATS */

.admin-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
  margin-bottom:2rem;
}

.stat-card{
  padding:1.4rem;
}

.stat-label{
  color:var(--muted);

  font-size:.78rem;
  font-family:'DM Mono',monospace;
}

.stat-val{
  font-size:2.5rem;
  font-weight:800;

  background:
    linear-gradient(135deg,var(--accent2),var(--accent3));

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TOAST */

#toast{
  position:fixed;
  bottom:1.5rem;
  right:1.5rem;

  padding:.9rem 1.2rem;

  border-radius:18px;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent3)
    );

  color:white;

  font-weight:700;
  font-size:.9rem;

  box-shadow:
    0 10px 30px rgba(124,58,237,.35);

  transform:translateY(70px);
  opacity:0;

  transition:.35s ease;

  z-index:9999;
}

#toast.show{
  transform:translateY(0);
  opacity:1;
}

/* EMPTY */

.empty{
  text-align:center;
  padding:4rem 2rem;
  color:var(--muted);
}

.empty span{
  display:block;
  font-size:4rem;
  margin-bottom:1rem;
}

/* TITLES */

.section-title{
  font-size:.95rem;
  font-weight:700;

  color:var(--muted);

  margin:1.8rem 0 1rem;

  font-family:'DM Mono',monospace;
  letter-spacing:1px;
  text-transform:uppercase;
}

/* RESPONSIVE */

@media (max-width:768px){

  nav{
    padding:1rem;
    flex-wrap:wrap;
    gap:1rem;
  }

  .form-row,
  .admin-grid{
    grid-template-columns:1fr;
  }

  .page{
    padding:1.2rem;
  }

  h2{
    font-size:1.8rem;
  }
}
</style>
</head>
<body>

<nav>
  <div class="logo">Tech<span>Zone</span></div>
  <div class="nav-tabs">
    <button class="tab active" onclick="showPage('catalog')">Catálogo</button>
    <button class="tab" onclick="showPage('orders')">Pedidos</button>
    <button class="tab" onclick="showPage('admin')">Admin</button>
  </div>
  <button class="cart-btn" onclick="showPage('cart')">🛒 Carrito <span id="cart-count">0</span></button>
</nav>

<!-- CATALOG -->
<div class="page active" id="page-catalog">
  <h2>Catálogo <span>TechZone</span></h2>
  <div class="filters" id="filters"></div>
  <div class="grid" id="product-grid"></div>

  <div class="section-title">✨ Recomendados para ti</div>
  <div class="grid" id="rec-grid"></div>
</div>

<!-- CART -->
<div class="page" id="page-cart">
  <h2>🛒 Carrito</h2>
  <div id="cart-items"></div>
  <div id="cart-summary"></div>
</div>

<!-- PAYMENT -->
<div class="page" id="page-payment">
  <h2>💳 Pago</h2>
  <div class="form-group">
    <label>NOMBRE COMPLETO</label>
    <input type="text" id="pay-name" placeholder="Juan Pérez">
  </div>
  <div class="form-group">
    <label>EMAIL</label>
    <input type="email" id="pay-email" placeholder="juan@email.com">
  </div>
  <div class="form-group">
    <label>NÚMERO DE TARJETA</label>
    <input type="text" id="pay-card" placeholder="1234 5678 9012 3456" maxlength="19">
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>VENCIMIENTO</label>
      <input type="text" id="pay-exp" placeholder="MM/AA" maxlength="5">
    </div>
    <div class="form-group">
      <label>CVV</label>
      <input type="text" id="pay-cvv" placeholder="123" maxlength="3">
    </div>
  </div>
  <div class="form-group">
    <label>DIRECCIÓN DE ENVÍO</label>
    <input type="text" id="pay-addr" placeholder="Calle 123, Ciudad">
  </div>
  <div style="margin-top:1rem">
    <button class="btn-secondary" onclick="showPage('cart')">← Volver</button>
    <button class="btn-primary" onclick="processPayment()">Confirmar Pedido</button>
  </div>
</div>

<!-- ORDERS -->
<div class="page" id="page-orders">
  <h2>📦 Mis <span>Pedidos</span></h2>
  <div id="orders-list"></div>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">
  <h2>⚙️ Panel <span>Admin</span></h2>
  <div class="admin-grid" id="admin-stats"></div>
  <h3 style="margin-bottom:1rem;font-size:1rem;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase">Inventario</h3>
  <table>
    <thead>
      <tr><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acción</th></tr>
    </thead>
    <tbody id="inventory-table"></tbody>
  </table>
</div>

<div id="toast"></div>

<script>
// === DATA ===
let products = [
  { id:1, name:'iPhone 15 Pro', cat:'Smartphones', price:4200000, stock:12, emoji:'📱' },
  { id:2, name:'Samsung S24 Ultra', cat:'Smartphones', price:3800000, stock:8, emoji:'📱' },
  { id:3, name:'MacBook Air M3', cat:'Laptops', price:6500000, stock:5, emoji:'💻' },
  { id:4, name:'Dell XPS 15', cat:'Laptops', price:5200000, stock:7, emoji:'💻' },
  { id:5, name:'iPad Pro 12.9"', cat:'Tablets', price:3100000, stock:10, emoji:'📟' },
  { id:6, name:'AirPods Pro 2', cat:'Audio', price:890000, stock:20, emoji:'🎧' },
  { id:7, name:'Sony WH-1000XM5', cat:'Audio', price:1100000, stock:15, emoji:'🎧' },
  { id:8, name:'RTX 4080 Super', cat:'Componentes', price:3400000, stock:3, emoji:'🖥️' },
  { id:9, name:'Samsung 4K 27"', cat:'Monitores', price:1800000, stock:6, emoji:'🖥️' },
  { id:10, name:'Logitech MX Keys', cat:'Periféricos', price:450000, stock:25, emoji:'⌨️' },
];

let cart = [];
let orders = JSON.parse(localStorage.getItem('tz-orders') || '[]');
let currentFilter = 'Todos';

const fmt = n => '$' + n.toLocaleString('es-CO');

// === NAV ===
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.toLowerCase().includes(id.slice(0,3))) t.classList.add('active');
  });
  if (id === 'catalog') renderCatalog();
  if (id === 'cart') renderCart();
  if (id === 'orders') renderOrders();
  if (id === 'admin') renderAdmin();
}

// === CATALOG ===
function renderCatalog() {
  const cats = ['Todos', ...new Set(products.map(p => p.cat))];
  const fEl = document.getElementById('filters');
  fEl.innerHTML = cats.map(c =>
    `<button class="filter-btn ${c === currentFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  const filtered = currentFilter === 'Todos' ? products : products.filter(p => p.cat === currentFilter);
  document.getElementById('product-grid').innerHTML = filtered.map(p => cardHTML(p, false)).join('');

  // Recomendaciones: top 3 más vistos (simulado: stock bajo = popular)
  const recs = [...products].sort((a,b) => a.stock - b.stock).slice(0,3);
  document.getElementById('rec-grid').innerHTML = recs.map(p => cardHTML(p, true)).join('');
}

function cardHTML(p, rec) {
  const lowStock = p.stock <= 5;
  return `<div class="card">
    ${rec ? '<span class="rec-badge">★ RECOMENDADO</span>' : ''}
    <div class="card-emoji">${p.emoji}</div>
    <div class="card-name">${p.name}</div>
    <div class="card-cat">${p.cat}</div>
    <div class="card-price">${fmt(p.price)}</div>
    <div class="card-stock ${lowStock ? 'low' : ''}">${lowStock ? '⚠ Solo ' : ''}${p.stock} en stock</div>
    <button class="add-btn" onclick="addToCart(${p.id})" ${p.stock === 0 ? 'disabled' : ''}>
      ${p.stock === 0 ? 'Sin stock' : '+ Agregar'}
    </button>
  </div>`;
}

function setFilter(cat) {
  currentFilter = cat;
  renderCatalog();
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) {
    if (existing.qty >= p.stock) { toast('Stock insuficiente'); return; }
    existing.qty++;
  } else {
    cart.push({ ...p, qty: 1 });
  }
  updateCartCount();
  toast(`${p.name} agregado ✓`);
}

function updateCartCount() {
  const total = cart.reduce((s, x) => s + x.qty, 0);
  document.getElementById('cart-count').textContent = total;
}

// === CART ===
function renderCart() {
  const el = document.getElementById('cart-items');
  const sm = document.getElementById('cart-summary');
  if (!cart.length) {
    el.innerHTML = '<div class="empty"><span>🛒</span>Tu carrito está vacío</div>';
    sm.innerHTML = '';
    return;
  }
  el.innerHTML = cart.map(item => `
    <div class="cart-item">
      <span style="font-size:1.8rem">${item.emoji}</span>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${fmt(item.price)}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span style="font-family:'Space Mono',monospace;font-size:.9rem">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
      </div>
      <button class="rm-btn" onclick="removeFromCart(${item.id})">✕</button>
    </div>
  `).join('');

  const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
  sm.innerHTML = `
    <div class="cart-summary">
      <div class="cart-total">Total: ${fmt(total)}</div>
      <button class="btn-primary" onclick="showPage('payment')">Proceder al pago →</button>
    </div>
  `;
}

function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  const p = products.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty > p.stock) { item.qty = p.stock; toast('Límite de stock'); }
  if (item.qty < 1) cart = cart.filter(x => x.id !== id);
  updateCartCount();
  renderCart();
}

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  updateCartCount();
  renderCart();
}

// === PAYMENT ===
document.getElementById('pay-card').addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g,'').slice(0,16);
  e.target.value = v.match(/.{1,4}/g)?.join(' ') || v;
});
document.getElementById('pay-exp').addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g,'');
  if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2,4);
  e.target.value = v;
});

function processPayment() {
  const fields = ['pay-name','pay-email','pay-card','pay-exp','pay-cvv','pay-addr'];
  for (const f of fields) {
    if (!document.getElementById(f).value.trim()) { toast('Completa todos los campos'); return; }
  }
  if (!cart.length) { toast('El carrito está vacío'); return; }

  // Descontar stock
  cart.forEach(item => {
    const p = products.find(x => x.id === item.id);
    if (p) p.stock -= item.qty;
  });

  const order = {
    id: 'TZ-' + Date.now().toString().slice(-6),
    date: new Date().toLocaleDateString('es-CO'),
    items: [...cart],
    total: cart.reduce((s,x) => s + x.price*x.qty, 0),
    status: 'pendiente',
    customer: document.getElementById('pay-name').value,
  };
  orders.unshift(order);
  localStorage.setItem('tz-orders', JSON.stringify(orders));
  cart = [];
  updateCartCount();
  fields.forEach(f => document.getElementById(f).value = '');
  toast('✓ Pedido confirmado!');
  showPage('orders');
}

// === ORDERS ===
const statusSteps = ['Confirmado','Preparando','Enviado','Entregado'];
const statusMap = { pendiente:1, enviado:2, entregado:3 };

function renderOrders() {
  const el = document.getElementById('orders-list');
  if (!orders.length) {
    el.innerHTML = '<div class="empty"><span>📦</span>No tienes pedidos aún</div>';
    return;
  }
  el.innerHTML = orders.map(o => {
    const step = statusMap[o.status] || 1;
    const steps = statusSteps.map((s,i) =>
      `<div class="tl-step ${i < step ? 'done' : ''}">${s}</div>`
    ).join('');
    return `
      <div class="order-card">
        <div class="order-header">
          <div>
            <div class="order-id">${o.id}</div>
            <div style="font-size:.8rem;color:var(--muted);margin-top:.2rem">${o.date} · ${o.items.length} producto(s)</div>
          </div>
          <div>
            <span class="status-badge status-${o.status}">${o.status.toUpperCase()}</span>
            <div style="text-align:right;margin-top:.4rem;font-size:.9rem;font-weight:800;color:var(--accent)">${fmt(o.total)}</div>
          </div>
        </div>
        <div style="font-size:.8rem;color:var(--muted);margin-bottom:.8rem">
          ${o.items.map(i => `${i.emoji} ${i.name} ×${i.qty}`).join(' · ')}
        </div>
        <div class="timeline">${steps}</div>
      </div>
    `;
  }).join('');
}

// === ADMIN ===
function renderAdmin() {
  const totalRevenue = orders.reduce((s,o) => s + o.total, 0);
  const lowStock = products.filter(p => p.stock <= 5).length;

  document.getElementById('admin-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">PEDIDOS TOTALES</div><div class="stat-val">${orders.length}</div></div>
    <div class="stat-card"><div class="stat-label">INGRESOS</div><div class="stat-val" style="font-size:1.3rem">${fmt(totalRevenue)}</div></div>
    <div class="stat-card"><div class="stat-label">PRODUCTOS</div><div class="stat-val">${products.length}</div></div>
    <div class="stat-card"><div class="stat-label">STOCK BAJO</div><div class="stat-val" style="color:var(--danger)">${lowStock}</div></div>
  `;

  document.getElementById('inventory-table').innerHTML = products.map(p => `
    <tr>
      <td>${p.emoji} ${p.name}</td>
      <td style="color:var(--muted);font-size:.8rem">${p.cat}</td>
      <td style="font-family:'Space Mono',monospace;color:var(--accent);font-size:.85rem">${fmt(p.price)}</td>
      <td style="color:${p.stock<=5?'var(--danger)':'var(--text)'}">${p.stock}</td>
      <td>
        <input class="stock-input" type="number" id="stock-${p.id}" value="${p.stock}" min="0">
        <button class="save-stock" onclick="updateStock(${p.id})">Guardar</button>
      </td>
    </tr>
  `).join('');

  // Actualizar status de pedidos en admin
  if (orders.length) {
    const ordEl = document.createElement('div');
    ordEl.style.marginTop = '2rem';
    ordEl.innerHTML = `<h3 style="margin-bottom:1rem;font-size:1rem;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase">Gestionar Pedidos</h3>`;
    orders.forEach((o, i) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:1rem;padding:.6rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:.4rem;font-size:.85rem;';
      row.innerHTML = `
        <span style="font-family:'Space Mono',monospace;color:var(--accent2)">${o.id}</span>
        <span style="flex:1;color:var(--muted)">${o.customer || 'Cliente'}</span>
        <select style="width:auto;padding:.2rem .4rem;font-size:.8rem" onchange="updateOrderStatus(${i}, this.value)">
          <option value="pendiente" ${o.status==='pendiente'?'selected':''}>Pendiente</option>
          <option value="enviado" ${o.status==='enviado'?'selected':''}>Enviado</option>
          <option value="entregado" ${o.status==='entregado'?'selected':''}>Entregado</option>
        </select>
      `;
      ordEl.appendChild(row);
    });
    document.getElementById('page-admin').appendChild(ordEl);
  }
}

function updateStock(id) {
  const p = products.find(x => x.id === id);
  const val = parseInt(document.getElementById('stock-' + id).value);
  if (isNaN(val) || val < 0) { toast('Valor inválido'); return; }
  p.stock = val;
  toast('Stock actualizado ✓');
  renderAdmin();
}

function updateOrderStatus(idx, status) {
  orders[idx].status = status;
  localStorage.setItem('tz-orders', JSON.stringify(orders));
  toast('Estado actualizado ✓');
}

// === TOAST ===
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
renderCatalog();
</script>
